<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - IC3 Complaints</title>
  <link rel="stylesheet" href="admin.css">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Login Section -->
  <div id="login-section" class="section active">
    <div class="login-box">
      <img src="images/logo.png" alt="Logo" class="logo">
      <h2>Admin Login</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div id="login-error" class="error-text"></div>
      </form>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard-section" class="section">
    <nav class="admin-nav">
      <h2>IC3 Admin Dashboard</h2>
      <button id="logout-btn">Logout</button>
    </nav>
    
    <div class="admin-container">
      
      <!-- Bulk Email Sender -->
      <div class="card email-sender">
        <h3>Send Bulk Email</h3>
        <p>Send an email to all complainants in the database using Google Workspace SMTP.</p>
        <form id="bulk-email-form">
          <input type="text" id="email-subject" placeholder="Subject" required>
          <textarea id="email-body" rows="6" placeholder="Write your email here... (HTML supported)" required></textarea>
          <button type="submit" id="send-email-btn">Send to All</button>
          <div id="email-status"></div>
        </form>
      </div>

      <!-- Complaints Table -->
      <div class="card">
        <h3>Recent Complaints</h3>
        <div class="table-container">
          <table id="complaints-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Email</th>
                <th>Category</th>
                <th>Loss Amount</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data will be populated here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
